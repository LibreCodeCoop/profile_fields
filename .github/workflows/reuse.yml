name: reuse

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - stable*

jobs:
  reuse:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run REUSE lint
        uses: fsfe/reuse-action@v6
