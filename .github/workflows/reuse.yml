name: reuse

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - stable*

jobs:
  reuse:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Run REUSE lint
        uses: fsfe/reuse-action@v6
