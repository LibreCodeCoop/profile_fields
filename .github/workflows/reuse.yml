name: reuse

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - stable*

jobs:
  reuse:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run REUSE lint
        uses: fsfe/reuse-action@v6
