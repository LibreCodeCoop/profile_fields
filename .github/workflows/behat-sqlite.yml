name: Behat SQLite

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: behat-sqlite-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    outputs:
      src: ${{ steps.changes.outputs.src }}

    steps:
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: changes
        continue-on-error: true
        with:
          filters: |
            src:
              - '.github/workflows/behat*'
              - 'appinfo/**'
              - 'lib/**'
              - 'templates/**'
              - 'tests/**'
              - 'vendor/**'
              - 'vendor-bin/**'
              - '.php-cs-fixer.dist.php'
              - 'composer.json'
              - 'composer.lock'

  behat-sqlite:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.src != 'false'
    timeout-minutes: 45
    env:
      APP_NAME: profile_fields

    name: SQLite PHP 8.2 Nextcloud master

    steps:
      - name: Checkout server
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: true
          repository: nextcloud/server
          ref: master

      - name: Checkout app
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          path: apps/${{ env.APP_NAME }}

      - name: Set up php 8.2
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2.37.0
        with:
          php-version: '8.2'
          extensions: bz2, ctype, curl, dom, fileinfo, gd, iconv, intl, json, libxml, mbstring, openssl, pcntl, posix, session, simplexml, sqlite, pdo_sqlite, xmlreader, xmlwriter, zip, zlib
          coverage: none
          ini-file: development
          ini-values: disable_functions=

      - name: Install app dependencies
        working-directory: apps/${{ env.APP_NAME }}
        run: |
          composer remove nextcloud/ocp --dev --no-scripts
          composer install --no-dev
          composer --working-dir=tests/integration install

      - name: Set up Nextcloud
        run: |
          mkdir data
          ./occ maintenance:install \
            --verbose \
            --database=sqlite \
            --database-name=nextcloud \
            --admin-user admin \
            --admin-pass admin
          ./occ app:enable --force ${{ env.APP_NAME }}
          ./occ config:system:set auth.bruteforce.protection.enabled --value false --type boolean
          ./occ config:system:set ratelimit.protection.enabled --value false --type boolean
          ./occ config:system:set debug --value true --type boolean

      - name: Run Behat
        working-directory: apps/${{ env.APP_NAME }}/tests/integration
        env:
          BEHAT_ROOT_DIR: ../../../../
          BEHAT_RUN_AS: runner
          BEHAT_VERBOSE: ${{ runner.debug }}
        run: composer run behat

      - name: Upload Behat results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: behat-results
          path: apps/${{ env.APP_NAME }}/tests/integration/output/
          retention-days: 30

      - name: Print logs
        if: always()
        run: cat data/nextcloud.log 2>/dev/null || true

  summary:
    permissions:
      contents: none
    runs-on: ubuntu-latest
    needs: [changes, behat-sqlite]
    if: always()

    name: behat-sqlite-summary

    steps:
      - name: Summary status
        run: if ${{ needs.changes.outputs.src != 'false' && needs.behat-sqlite.result != 'success' }}; then exit 1; fi
